name: Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  merge_group:
  push:
    branches:
      - staging
      - trying
      - master

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Cache pip wheels
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements/*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/docs.txt -r requirements/lint.txt
          pip check

      - name: doc8
        run: |
          doc8 ESSArch_Core/docs

      - name: flake8
        run: |
          flake8

      - name: isort
        run: |
          isort --check-only --diff .

      - name: prettier
        run: |
          yarn prettier --check "ESSArch_Core/frontend/static/frontend/**/*.{ts,js,scss,html}"

      - name: stylelint
        run: |
          yarn stylelint

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build:prod

  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache pip wheels
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements/*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=/home/runner/work/ESSArch/ESSArch/config" >> $GITHUB_ENV
          echo "ESSARCH_DIR=/home/runner/work/ESSArch/ESSArch" >> $GITHUB_ENV

      - name: Install
        run: |
          mkdir -p log
          mkdir -p config
          python -m pip install --upgrade pip wheel setuptools
          git config user.email test
          git config user.name test
          t="0+`git rev-parse --short HEAD`"
          git tag -a $t -m $t
          pip install -e .[docs]
          essarch settings generate -q -p config/local_essarch_settings.py

      - name: Build
        run: |
          cd ESSArch_Core/docs
          make html SPHINXOPTS="-W"

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          cd docker
          docker compose build essarch

  test-windows:
    runs-on: windows-latest
    env:
      DATABASE_URL_ESSARCH: 'mssql://SA:MyPassword42@localhost:1433/essarch?CONN_MAX_AGE=100&CONN_HEALTH_CHECKS=True&isolation_level=read committed&driver=ODBC Driver 18 for SQL Server&extra_params=TrustServerCertificate=yes'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=D:\a\ESSArch\ESSArch\config" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf-8 -Append
          echo "ESSARCH_DIR=D:\a\ESSArch\ESSArch" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf-8 -Append

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Cache pip wheels
        uses: actions/cache@v5
        with:
          path: ${{ env.LOCALAPPDATA }}\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements/*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache installers
        uses: actions/cache@v5
        with:
          path: C:\installers
          key: windows-installers-gtk3-3.24.31-odbc18

      - name: Cache Chocolatey packages
        uses: actions/cache@v5
        with:
          path: C:\ProgramData\chocolatey\lib
          key: ${{ runner.os }}-choco-${{ hashFiles('.github/workflows/*.yml') }}

      - name: Cache Chocolatey downloads
        uses: actions/cache@v5
        with:
          path: C:\Users\runneradmin\AppData\Local\Temp\chocolatey
          key: ${{ runner.os }}-choco-downloads

      - name: Install system dependencies (cached)
        id: deps
        run: |
          if (!(Get-Service -Name 'MSSQLSERVER' -ErrorAction SilentlyContinue)) {
            Write-Host "Installing sql-server-express..."
            choco install sql-server-express -o -ia "'/IACCEPTSQLSERVERLICENSETERMS /Q /ACTION=install /INSTANCEID=MSSQLSERVER /INSTANCENAME=MSSQLSERVER /UPDATEENABLED=FALSE /TCPENABLED=1 /SECURITYMODE=SQL /SAPWD=MyPassword42'" -f -y
          }
          if (!(Get-Service -Name 'MSSQLSERVER' -ErrorAction SilentlyContinue)) {
            Write-Error "sql-server-express MSSQLSERVER installation failed!"
            exit 1
          }   

          if (!(Get-Command magick -ErrorAction SilentlyContinue)) {
            Write-Host "Installing imagemagick..."
            choco install imagemagick -y
          }            

          if (!(Get-Command redis-server -ErrorAction SilentlyContinue)) {
            Write-Host "Installing redis-64..."
            choco install redis-64 --version 3.0.503 -y
          }

      - name: Install
        run: |
          if (!(Test-Path "C:\installers")) {
            New-Item -ItemType Directory -Path "C:\installers"
          }

          $gtk = "C:\installers\gtk3.exe"
          $odbc = "C:\installers\msodbcsql.msi"

          if (!(Test-Path $gtk)) {
            Start-BitsTransfer -Source "https://github.com/tschoonj/GTK-for-Windows-Runtime-Environment-Installer/releases/download/2022-01-04/gtk3-runtime-3.24.31-2022-01-04-ts-win64.exe" -Destination $gtk
          }

          if (!(Test-Path $odbc)) {
            Start-BitsTransfer -Source "https://download.microsoft.com/download/1/7/4/17423b83-b75d-42e1-b5b9-eaa266561c5e/Windows/amd64/1033/msodbcsql.msi" -Destination $odbc
          }

          if (!(Test-Path "C:\Program Files\GTK3-Runtime Win64")) {
            Write-Host "Installing GTK3..."
            Start-Process -FilePath $gtk -Wait -ArgumentList "/S"
          }

          $odbcInstalled = Get-OdbcDriver | Where-Object { $_.Name -like "*ODBC Driver 18*" }
          if (-not $odbcInstalled) {
            Write-Host "Installing ODBC driver..."
            Start-Process msiexec.exe -Wait -ArgumentList "/I $odbc IACCEPTMSODBCSQLLICENSETERMS=YES ADDLOCAL=ALL /quiet /qn /norestart"
          }
          $odbcInstalled = Get-OdbcDriver | Where-Object { $_.Name -like "*ODBC Driver 18*" }
          if (-not $odbcInstalled) {
            Write-Error "ODBC installation failed!"
             exit 1
          }          

          python -m pip install --upgrade pip wheel setuptools
          git config user.email test
          git config user.name test
          $t=&git rev-parse --short HEAD
          git tag -a "0+$t" -m "0+$t"
          pip install .[mssql]
          pip install -r requirements/tests.txt
          pip check
          mkdir config
          mkdir log
          essarch settings generate --overwrite -q -p config/local_essarch_settings.py

          # Add geckodriver to PATH
          echo "$env:GeckoWebDrive" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          # Make all PATH additions global
          echo "C:\Program Files\GTK3-Runtime Win64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build frontend
        run: yarn build:prod

      - name: Test
        run: |
          start redis-server
          coverage run manage.py test --verbosity=2 --exclude-tag=requires-elasticsearch
      - name: Report code coverage
        run: |
          coverage xml
      - name: Codecov
        uses: codecov/codecov-action@v6
        with:
          name: Windows
          files: ./coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  test-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mariadb, mysql, postgres, mssql]

        include:
          - db: sqlite
            database_url: 'sqlite:///db.sqlite'
            image: busybox
            port: 1234
            health_cmd: true
          - db: mariadb
            database_url: 'mysql://root:password@127.0.0.1:13306/essarch?isolation_level=read committed'
            image: mariadb:10.11
            port: 3306
            health_cmd: mysqladmin ping -h 127.0.0.1 -ppassword
          - db: mysql
            database_url: 'mysql://root:password@127.0.0.1:13306/essarch?isolation_level=read committed'
            image: 'mysql:8.0.12'
            port: 3306
            health_cmd: mysqladmin ping --user=root -ppassword
          - db: postgres
            database_url: 'postgres://postgres:postgres@127.0.0.1:13306/essarch?isolation_level=1'
            image: postgres
            port: 5432
            health_cmd: pg_isready
          - db: mssql
            database_url: 'mssql://SA:MyPassword42@127.0.0.1:13306/essarch?CONN_MAX_AGE=100&CONN_HEALTH_CHECKS=True&isolation_level=read committed&driver=ODBC Driver 18 for SQL Server&extra_params=TrustServerCertificate=yes'
            image: mcr.microsoft.com/mssql/server:2019-latest
            port: 1433
            health_cmd: true

    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.6.1
        ports:
          - 19200:9200
        options: >-
          -e="discovery.type=single-node"
          --name="elasticsearch"
          --health-cmd="curl http://localhost:9200/_cluster/health"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      ${{ matrix.db }}:
        image: ${{ matrix.image }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: essarch

          MYSQL_DATABASE: essarch
          MYSQL_USER: arkiv
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: password
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'

          ACCEPT_EULA: Y
          SA_PASSWORD: MyPassword42
        ports:
          - 13306:${{ matrix.port }}
        options: >-
          -it
          --name="${{ matrix.db }}1"
          --health-cmd="${{ matrix.health_cmd }}"
          --health-interval 2s
          --health-timeout 10s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=/home/runner/work/ESSArch/ESSArch/config" >> $GITHUB_ENV
          echo "ESSARCH_DIR=/home/runner/work/ESSArch/ESSArch" >> $GITHUB_ENV

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Cache pip wheels
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements/*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Setup apache http schemaserver
        run: |
          sudo apt-get update && sudo apt-get install apache2
          sudo a2enmod speling
          sudo wget https://files.essarch.org/dist/ESSArch_schema-3.1.2_linux.tar.gz
          sudo mkdir /var/www/schema
          sudo tar -x -v -f ESSArch_schema-3.1.2_linux.tar.gz -C /var/www/schema
          sudo wget https://files.essarch.org/dist/httpd-schema.conf
          sudo sed -e "s?\${ESSARCH_DIR}?\/var\/www?g" --in-place httpd-schema.conf
          sudo mv httpd-schema.conf /etc/apache2/sites-enabled/
          sudo echo "Adding entrys for locale schemaserver to /etc/hosts"
          sudo echo "127.0.0.1       www.w3.org schema.arkivverket.no arkivverket.no www.loc.gov xml.ra.se www.arkivverket.no www.dasboard.eu xml.essarch.org" | sudo tee -a /etc/hosts
          sudo service apache2 restart

      - name: Install
        run: |
          docker exec elasticsearch elasticsearch-plugin install --batch ingest-attachment
          docker restart elasticsearch

          curl -sSL -O https://packages.microsoft.com/config/ubuntu/$(grep VERSION_ID /etc/os-release | cut -d '"' -f 2)/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          rm packages-microsoft-prod.deb
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 g++ unixodbc-dev default-libmysqlclient-dev libpq-dev

          python -m pip install --upgrade pip wheel setuptools
          git config user.email test
          git config user.name test
          t="0+`git rev-parse --short HEAD`"
          git tag -a $t -m $t
          pip install .[mssql,mysql,postgres]
          pip install -r requirements/tests.txt
          pip check
          mkdir config
          mkdir log
          essarch settings generate --overwrite -q -p config/local_essarch_settings.py

          wget https://github.com/mozilla/geckodriver/releases/download/v0.32.2/geckodriver-v0.32.2-linux64.tar.gz
          tar -xvzf geckodriver*
          sudo mv geckodriver /usr/local/bin

      - name: Build frontend
        run: yarn build:prod

      - name: Test
        env:
          DATABASE_URL_ESSARCH: ${{ matrix.database_url }}
        run: |
          coverage run manage.py test --verbosity=2
      - name: Report code coverage
        run: |
          coverage xml
      - name: Codecov
        uses: codecov/codecov-action@v6
        with:
          name: Linux (${{matrix.db}})
          files: ./coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
